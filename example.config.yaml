# example.config.yaml — Full configuration reference. Safe to commit (no secrets).
# Copy to config.yaml and edit. API keys live in environment variables only.

context: 16384

# ---------------------------------------------------------------------------
# compaction:
#   Summary-based history compaction when the active prompt gets large.
#   Disable this or raise trigger_pct if you want to preserve llama.cpp
#   prompt-cache locality more aggressively during long tool chains.
# ---------------------------------------------------------------------------
compaction:
  enabled: true
  trigger_pct: 0.90
  keep_last_units: 4
  summary_max_chars: 6000

# ---------------------------------------------------------------------------
# models:
#   Named model definitions. Add as many as you need.
#
#   kind: chat      (default) — /v1/chat/completions, used for inference
#   kind: embedding           — /v1/embeddings, used by the memory module
#                               max_tokens and temperature are ignored
#
#   Embedding models are NOT eligible for llm: routing.
#
#   llama.cpp-only prompt reuse knobs:
#     llama_cpp_cache_prompt: true   # send cache_prompt=true
#     llama_cpp_sticky_slots: true   # remember returned slot id per TinyCTX session
#     llama_cpp_slot_id: 0           # optional fixed slot id override
# ---------------------------------------------------------------------------
models:
  smart:
    base_url: https://api.anthropic.com/v1
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 4096
    temperature: 0.7

  fast:
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 2048
    temperature: 0.7

  local:
    base_url: http://localhost:11434/v1
    api_key_env: N/A          # local endpoints need no key
    model: qwen3:32b
    max_tokens: 8192
    temperature: 0.6
    # If this points at a llama.cpp server instead of Ollama, enable:
    # llama_cpp_cache_prompt: true
    # llama_cpp_sticky_slots: true

  embed:
    kind: embedding
    base_url: http://localhost:11434/v1
    api_key_env: N/A
    model: nomic-embed-text   # or mxbai-embed-large, all-minilm, etc.

# ---------------------------------------------------------------------------
# llm:
#   Which chat model to use and when to fall back.
#   Only kind: chat models (or models with no kind) are valid here.
# ---------------------------------------------------------------------------
llm:
  primary: smart
  fallback:
    - fast
    - local
  fallback_on:
    any_error: false
    http_codes: [429, 500, 502, 503, 504]

# ---------------------------------------------------------------------------
# workspace:
#   Global persistent directory. All modules resolve their data paths here.
#   Sessions, memory index, and other module state live under this root.
# ---------------------------------------------------------------------------
workspace:
  path: ~/.tinyctx

# ---------------------------------------------------------------------------
# router:  (internal session router — rarely needs changing)
# ---------------------------------------------------------------------------
# router:
#   host: 127.0.0.1
#   port: 8765

# ---------------------------------------------------------------------------
# gateway:  (HTTP/SSE API — enable to allow external clients)
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  host: 127.0.0.1
  port: 8080
  api_key: "your-secret-token"

# ---------------------------------------------------------------------------
# bridges:
#
# Only bridges with enabled: true are loaded at startup.
# Each bridge reads its token/password from an environment variable —
# never put credentials directly in config.yaml.
#
# Options specific to each bridge live under the bridge's `options:` key.
# ---------------------------------------------------------------------------
bridges:
  # --------------------------------------------------------------------------
  # CLI bridge — interactive terminal session.
  # quiet_startup hides startup/runtime INFO chatter in the terminal.
  # log_level defaults to WARNING for the CLI; set to inherit or INFO if you
  # want to see module/server logs live while chatting.
  # --------------------------------------------------------------------------
  cli:
    enabled: true
    options:
      quiet_startup: true
      log_level: WARNING

  # --------------------------------------------------------------------------
  # Discord bridge
  #
  # Required setup:
  #   1. Create a bot at https://discord.com/developers/applications
  #   2. Enable "Message Content Intent" and "Server Members Intent"
  #      under Bot → Privileged Gateway Intents
  #   3. export DISCORD_BOT_TOKEN=your-token-here
  #
  # Invite URL scopes: bot
  # Invite URL permissions: Read Messages, Send Messages, Read Message History
  #
  # Finding your user ID:
  #   Enable Developer Mode in Discord (Settings → Advanced → Developer Mode),
  #   then right-click your username and select "Copy User ID".
  #
  # Options:
  #   token_env        Env var holding the bot token. Default: DISCORD_BOT_TOKEN
  #   allowed_users    Allowlist of Discord user IDs (integers). Only these users
  #                    can interact with the bot. Empty = open to everyone
  #                    (NOT recommended if the bot has tool access).
  #   dm_enabled       Allow DMs to the bot. Default: true
  #   guild_ids        Whitelist of guild IDs (integers). Empty = all guilds.
  #   prefix_required  In guild channels, only respond when @mentioned or when
  #                    the message starts with command_prefix. Default: true
  #   command_prefix   Text prefix that triggers the bot in guild channels.
  #                    Default: "!"
  #   max_reply_length Max characters per Discord message before chunking.
  #                    Default: 1900 (stays under Discord's 2000-char limit)
  #   typing_indicator Show "Bot is typing..." while the agent is running.
  #                    Default: true
  # --------------------------------------------------------------------------
  discord:
    enabled: false
    options:
      token_env: DISCORD_BOT_TOKEN
      allowed_users: []           # e.g. [123456789012345678, 987654321098765432]
      dm_enabled: true
      guild_ids: []               # e.g. [123456789012345678]
      prefix_required: true
      command_prefix: "!"
      max_reply_length: 1900
      typing_indicator: true

  # --------------------------------------------------------------------------
  # Matrix bridge
  #
  # Required setup:
  #   1. pip install matrix-nio  (or matrix-nio[e2e] for E2EE support)
  #   2. export MATRIX_PASSWORD=your-password-here
  #
  # Finding your MXID:
  #   Your full Matrix ID is shown in your client under Settings → Profile,
  #   in the format @username:homeserver.tld
  #
  # Options:
  #   homeserver       Full URL of your homeserver.
  #   username         Full Matrix ID of the bot account (@bot:server.tld).
  #   password_env     Env var holding the account password. Default: MATRIX_PASSWORD
  #   device_name      Device label shown in account sessions. Default: TinyCTX
  #   store_path       nio key store path, relative to workspace. Default: matrix_store
  #   allowed_users    Allowlist of full MXIDs (@user:server.tld). Only these users
  #                    can interact with the bot. Empty = open to everyone
  #                    (NOT recommended if the bot has tool access).
  #   dm_enabled       Respond in 1-on-1 rooms. Default: true
  #   room_ids         Whitelist of room IDs. Empty = all joined rooms.
  #   prefix_required  In group rooms, only respond when @mentioned or prefixed.
  #                    Default: true
  #   command_prefix   Default: "!"
  #   max_reply_length Default: 16000
  #   sync_timeout_ms  Long-poll timeout per /sync call. Default: 30000
  # --------------------------------------------------------------------------
  matrix:
    enabled: false
    options:
      homeserver: https://matrix.org
      username: "@yourbot:matrix.org"
      password_env: MATRIX_PASSWORD
      device_name: TinyCTX
      store_path: matrix_store
      allowed_users: []           # e.g. ["@you:matrix.org", "@friend:matrix.org"]
      dm_enabled: true
      room_ids: []
      prefix_required: true
      command_prefix: "!"
      max_reply_length: 16000
      sync_timeout_ms: 30000

# ---------------------------------------------------------------------------
# memory_search:  (extra key — consumed by modules/memory)
#
# All keys are optional. Defaults are in modules/memory/__init__.py.
#
# Static prompt files — read fresh every turn, injected as system prompts.
# Paths are relative to workspace.path unless absolute.
#   soul_file / agents_file / memory_file
#   soul_priority / agents_priority / memory_priority  (lower = injected first)
#
# Search index
#   memory_dir    directory scanned recursively for *.md files
#   db_file       SQLite cache path (relative to workspace.path)
#
# Chunking
#   chunk_strategy   "markdown" | "tokens" | "chars" | "delimiter"
#   chunk_kwargs     strategy-specific overrides (see examples below)
#
# Embedding
#   embedding_model  key from models: with kind: embedding
#                    omit or set "" for BM25-only mode (no embedding server needed)
#
# Retrieval
#   top_k            chunks fetched from the index (before budget trimming)
#   bm25_weight      BM25 share of hybrid score  (vector = 1 - bm25_weight)
#
# Memory budget
#   memory_budget_tokens  max tokens the injected <memory> block may use.
#                         Chunks are added highest-score-first; once the next
#                         chunk would exceed the budget it is dropped and a
#                         truncation note is appended instead.
#                         Set to 0 to disable (inject all top_k results).
#                         Rule of thumb: keep << context / 4 so search results
#                         don't crowd out conversation history.
#
# Auto-inject
#   auto_inject      true:  inject budgeted results as a system prompt every turn
#                    false: retrieval only when the agent calls memory_search()
#   search_priority  system prompt priority for the injected block
# ---------------------------------------------------------------------------
memory_search:
  # soul_file:    SOUL.md
  # agents_file:  AGENTS.md
  # memory_file:  MEMORY.md
  # soul_priority:    0
  # agents_priority: 10
  # memory_priority: 20

  # memory_dir: memory
  # db_file:    memory/cache.db

  # chunk_strategy: markdown
  # chunk_kwargs: {}
  # chunk_kwargs examples:
  #   tokens:    {chunk_tokens: 256, overlap_tokens: 32}
  #   chars:     {chunk_size: 800, overlap: 100}
  #   delimiter: {delimiter: "---"}
  #   markdown:  {min_chunk_chars: 100}

  embedding_model: embed    # remove or set "" for BM25-only mode

  # top_k: 5
  # bm25_weight: 0.3

  # memory_budget_tokens: 2048

  # auto_inject: true
  # search_priority: 25

  # Per-tool visibility (default: always_on):
  # tools:
  #   memory_search: always_on  # or deferred, disabled

# ---------------------------------------------------------------------------
# skills:  (consumed by modules/skills)
#
# use_skill is always_on by default — the index prompt already tells the LLM
# which skills exist; use_skill loads the full body on demand.
# ---------------------------------------------------------------------------
# skills:
#   tools:
#     use_skill: always_on  # or deferred, disabled

# ---------------------------------------------------------------------------
# web:  (consumed by modules/web)
#
# Per-tool visibility — defaults:
#   web_search, browse_url, navigate:  always_on
#   all other tools:       deferred
#
# Override individual tools:
# ---------------------------------------------------------------------------
# web:
#   tools:
#     web_search:    always_on
#     browse_url:    always_on
#     navigate:      always_on
#     http_request:  deferred
#     screenshot:    disabled

# ---------------------------------------------------------------------------
# mcp:  (consumed by modules/mcp)
#
# Each server entry under mcp.servers supports an optional 'tools:' block
# that controls per-tool visibility in the LLM's tool list.
#
# Per-tool visibility values:
#   always_on  — tool is registered and immediately enabled every turn
#   deferred   — tool is registered but hidden; agent must call tools_search (default)
#   disabled   — tool is never registered at all
#
# If no 'tools:' block is present, all tools from that server default to 'deferred'.
# ---------------------------------------------------------------------------
# mcp:
#   servers:
#     filesystem:
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
#       tools:
#         read_file:    always_on
#         write_file:   deferred
#         delete_file:  disabled
#
#     postgres:
#       command: uvx
#       args: ["mcp-server-postgres", "--db-url", "postgresql://localhost/mydb"]
#       # no tools: block — all tools default to deferred

# ---------------------------------------------------------------------------
# logging:
# ---------------------------------------------------------------------------
logging:
  level: INFO

max_tool_cycles: 10
